name: Deep Clean History

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "yes" to confirm deep clean'
        required: true
        default: 'no'

permissions:
  contents: write

jobs:
  clean:
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'yes'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install git-filter-repo
        run: |
          sudo apt update
          sudo apt install -y git-filter-repo

      - name: Remove videos/ folder from history
        run: git filter-repo --path videos/ --invert-paths --force

      - name: Remove all refs/original/
        run: git for-each-ref --format="%(refname)" refs/original/ | xargs -r git update-ref -d

      - name: Expire reflog and garbage collect
        run: |
          git reflog expire --expire=now --all
          git gc --prune=now --aggressive

      - name: Add remote origin (since filter-repo removes it)
        run: |
          git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}

      - name: Force push cleaned history
        run: |
          git push origin --force --all
          git push origin --force --tags
